# ─── MySQL Database Configuration ─────────────────────────────────────────────
# For LOCAL development: uses localhost MySQL
# For RENDER deployment: override via environment variables in the Render dashboard
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/portfolio_db?createDatabaseIfNotExist=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Chatrapathi@09}

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ─── Server Port ─────────────────────────────────────────────────────────────
# Render sets PORT env variable automatically; Spring Boot uses server.port
server.port=${PORT:8080}
