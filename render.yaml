services:
  # ─── Backend: Spring Boot API ─────────────────────────────────────────────
  - type: web
    name: portfolio-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: DB_URL
        value: jdbc:mysql://mysql-1da09f00-chatrapathireddythigulla-cd6e.l.aivencloud.com:18205/defaultdb?sslMode=REQUIRED
      - key: DB_USERNAME
        value: avnadmin
      - key: DB_PASSWORD
        sync: false   # Set this secret in the Render dashboard → Environment
      - key: PORT
        value: 8080

  # ─── Frontend: React Static Site ─────────────────────────────────────────
  - type: web
    name: portfolio-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://portfolio-backend.onrender.com
    routes:
      # SPA fallback: all routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
